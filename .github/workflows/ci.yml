name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: fmt
        run: cargo fmt --all --check

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libshaderc-dev pkg-config cmake git python3 ninja-build build-essential \
            libvulkan-dev vulkan-tools libglfw3-dev \
            libwayland-dev libxkbcommon-dev xorg-dev
      - name: tests
        run: cargo test --workspace --all-targets

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libshaderc-dev pkg-config cmake git python3 ninja-build build-essential \
            libvulkan-dev vulkan-tools libglfw3-dev \
            libwayland-dev libxkbcommon-dev xorg-dev
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
